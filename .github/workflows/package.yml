name: Package Skill

on:
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "scripts/package_skill.py"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build .skill file
        run: python scripts/package_skill.py . .

      - name: Commit updated .skill file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add role-performance-review.skill
          git diff --cached --quiet || git commit -m "chore: rebuild role-performance-review.skill [skip ci]"
          git push
