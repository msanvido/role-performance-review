name: Package & Release Skill

on:
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "scripts/package_skill.py"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build .skill file
        run: python scripts/package_skill.py . dist/

      - name: Delete existing 'latest' release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create release and upload artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Latest" \
            --notes "Auto-built from the latest \`SKILL.md\`. Download \`role-performance-review.skill\` below to install." \
            --latest \
            dist/role-performance-review.skill
